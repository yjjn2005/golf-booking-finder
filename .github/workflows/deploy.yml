name: 🚀 GitHub Pages 배포

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: 📦 빌드
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          # GitHub Secrets에 등록된 API 키 사용
          VITE_GOLFMON_API_KEY:     ${{ secrets.VITE_GOLFMON_API_KEY }}
          VITE_GOLFANG_API_KEY:     ${{ secrets.VITE_GOLFANG_API_KEY }}
          VITE_JOINBOOKING_API_KEY: ${{ secrets.VITE_JOINBOOKING_API_KEY }}
          VITE_BASE_LAT: "37.5145"
          VITE_BASE_LNG: "127.1059"

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

  deploy:
    name: 🌐 배포
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
